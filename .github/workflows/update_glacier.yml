name: Weekly Glacier Data Update

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  update-glacier-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install earthengine-api pandas requests

      - name: Run GEE update script
        env:
          EE_CREDENTIALS: ${{ secrets.EE_CREDENTIALS }}
          GOOGLE_DRIVE_TOKEN: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
        run: python update_gee.py

      - name: Show result
        run: cat latest_values.csv
