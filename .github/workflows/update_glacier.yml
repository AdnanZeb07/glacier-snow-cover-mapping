name: Weekly Glacier Data Update

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 2:00 AM UTC
  workflow_dispatch:        # Also allow manual trigger from GitHub UI

jobs:
  update-glacier-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_gee.txt

      - name: Run GEE update script
        env:
          EE_CREDENTIALS: ${{ secrets.EE_CREDENTIALS }}
          GOOGLE_DRIVE_TOKEN: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
        run: |
          python update_gee.py

      - name: Confirm completion
        run: |
          echo "✅ Glacier data update completed at $(date)"
          cat latest_values.csv
