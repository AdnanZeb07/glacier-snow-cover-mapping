name: Daily Glacier Data Update

on:
  schedule:
    - cron: '0 3 * * *'   # Every day at 3:00 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  update-glacier-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install earthengine-api pandas requests numpy rasterio

      - name: Run update script
        env:
          EE_CREDENTIALS: ${{ secrets.EE_CREDENTIALS }}
          GOOGLE_DRIVE_TOKEN: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
          PLANET_API_KEY: ${{ secrets.PLANET_API_KEY }}
        run: python update_gee.py

      - name: Show result
        run: cat latest_values.csv
